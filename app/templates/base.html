<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POS-система{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 20px;
            color: #1a1a1a;
        }
        h1 { margin-bottom: 24px; }
        label { display: block; margin-top: 16px; font-weight: 600; font-size: 0.9rem; }
        input, select {
            display: block;
            width: 100%;
            padding: 8px 10px;
            margin-top: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px rgba(74,144,226,0.2);
        }
        .hint { font-size: 0.8rem; color: #666; margin-top: 3px; }
        .required { color: #c00; }
        .errors {
            background: #fff0f0;
            border: 1px solid #e88;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .errors ul { margin: 0; padding-left: 20px; }
        .errors li { color: #b00; margin: 4px 0; }
        .success {
            background: #f0fff4;
            border: 1px solid #6c6;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #050;
        }
        .success a { color: #050; }
        .actions { margin-top: 28px; display: flex; gap: 12px; align-items: center; }
        button[type="submit"] {
            padding: 10px 28px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        button[type="submit"]:hover { background: #1d4ed8; }
    </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
