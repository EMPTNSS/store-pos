{# Строка управления сменой. Перерисовывается целиком при открытии/закрытии дня
   (HTMX-таргет #day-status). Итоговый документ дня (23.2–23.5) — этап 7.1, не здесь. #}
<div id="day-status" class="day-status {{ 'is-open' if day_open else 'is-closed' }}">
    {% if error %}
    <span class="day-error">{{ error }}</span>
    {% endif %}
    {% if day_open %}
    <span class="day-badge">Рабочий день открыт</span>
    <form class="inline-form" hx-post="/work-day/close"
          hx-target="#day-status" hx-swap="outerHTML">
        <button type="submit" class="btn-day btn-day-close">Завершить рабочий день</button>
    </form>
    {% else %}
    <span class="day-badge">Рабочий день не открыт</span>
    <form class="inline-form" hx-post="/work-day/open"
          hx-target="#day-status" hx-swap="outerHTML">
        <button type="submit" class="btn-day btn-day-open">Начать рабочий день</button>
    </form>
    {% endif %}
</div>
