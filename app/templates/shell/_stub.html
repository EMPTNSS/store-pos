<div class="panel-stub">
    <h1>{{ title }}</h1>
    <p>Раздел «{{ title }}» — в разработке. Содержимое появится на своём этапе.</p>
    {% if test_field %}
    <!-- Временное тестовое поле: проверка сохранности состояния при переключении вкладок.
         Уйдёт при наполнении раздела «Добавить» (этап 6). -->
    <label for="add-test-field">Тестовое поле (проверка сохранности)</label>
    <input type="text" id="add-test-field" name="add_test_field" autocomplete="off"
           placeholder="Введите текст, уйдите на кассу и вернитесь">
    {% endif %}
</div>
