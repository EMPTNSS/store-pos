{% extends "base.html" %}

{% block title %}POS-система{% endblock %}

{% block content %}
<style>
    /* Баннер начала дня — во всю ширину, над вкладками. */
    .day-banner { display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
        width: 100%; padding: 12px 16px; background: #FFFBEB;
        border-bottom: 1px solid #FCD34D; color: #92400E; }
    .day-banner-text { font-weight: 600; }
    .day-banner-form { margin: 0; }
    .btn-day-start { padding: 8px 18px; background: #2563eb; color: #fff; border: none;
        border-radius: 4px; font-size: 0.95rem; cursor: pointer; }
    .btn-day-start:hover { background: #1d4ed8; }
    .day-banner-note { margin-left: auto; font-weight: 600; }
    .btn-day-doc { padding: 6px 14px; background: #92400E; color: #fff; border: none;
        border-radius: 4px; font-size: 0.9rem; cursor: pointer; }

    /* Отступы содержимого под баннером (сам баннер — вровень с краями). */
    .shell-body { padding: 0 16px; }

    /* Вкладки — как браузерные табы: закруглены сверху, без нижней границы,
       активная белая, прижаты к левому краю (не растянуты, не по центру). */
    .tabs { display: flex; gap: 4px; margin: 0; padding: 8px 0 0; }
    .tab { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
        border: 1px solid #e5e7eb; border-bottom: none; border-radius: 8px 8px 0 0;
        background: #eef0f3; color: #374151; cursor: pointer; font-size: 0.95rem; }
    .tab.active { background: #fff; color: #111; font-weight: 600; }
    .tab .close { border: none; background: none; color: #9ca3af; cursor: pointer;
        font-size: 1rem; line-height: 1; padding: 0 2px; }
    .tab .close:hover { color: #c0392b; }

    /* Основная раскладка: касса слева (2/3), колонка разделов справа (1/3). */
    .cashier-layout { display: flex; gap: 16px; align-items: stretch;
        min-height: calc(100vh - 150px); border-top: 1px solid #e5e7eb; padding-top: 16px; }
    .cashier-main { flex: 2; min-width: 0; padding-right: 16px;
        border-right: 1px solid #D9DBE1; }
    .cashier-side { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    /* Кнопки разделов — вертикальная колонка. Иконка (инлайн SVG) слева от текста. */
    .launcher { display: flex; flex-direction: column; gap: 10px; }
    .btn-side { height: 64px; width: 100%; padding: 0 16px; font-size: 15px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        background: #fff; border: 1px solid #D9DBE1; border-radius: 6px; color: #1a1a1a;
        cursor: pointer; }
    .btn-side:hover { background: #f8f9fb; }
    .btn-side svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Нижняя группа: завершить день / возврат — прижата к низу колонки,
       отделена разделителем от блока обычных кнопок. */
    .side-day { margin-top: auto; padding-top: 10px; border-top: 1px solid #D9DBE1;
        display: flex; flex-direction: column; gap: 10px; }
    .day-close-form { margin: 0; }
    /* Приглушённо-жёлтая (warning). Специфичность .btn-side.btn-day-finish перебивает
       общий стиль button[type="submit"] из base.html — без синего акцента. */
    .btn-side.btn-day-finish { background: #FFFBEB; border: 1px solid #FCD34D; color: #92400E; }
    .btn-side.btn-day-finish:hover:not(:disabled) { background: #fef3c7; }
    .btn-side.btn-day-finish:disabled { opacity: 0.6; cursor: default; }
    .btn-return { background: #fff0f0; border-color: #e88; color: #b00; }
    .btn-return:hover { background: #fee2e2; }

    .panel { display: none; }
    .panel.active { display: block; }
    .panel-stub { color: #6b7280; padding: 24px 0; }

    /* Модалка возврата — оверлей поверх кассы. */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100;
        background: rgba(17, 24, 39, 0.5); overflow-y: auto; }
    .modal-overlay.open { display: block; }
    .return-modal-card { background: #fff; max-width: 760px; margin: 40px auto;
        padding: 20px 24px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.25); }
    .return-modal-header { display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid #eee; margin-bottom: 16px; }
    .return-modal-header h2 { margin: 0; }
    .return-close { border: none; background: none; font-size: 1.6rem; line-height: 1;
        color: #9ca3af; cursor: pointer; }
    .return-close:hover { color: #c0392b; }
    .return-modal-footer { margin-top: 16px; text-align: right; }

    /* Блок «Возврат по чеку» (4.2): поиск чека и его read-only строки. */
    .receipt-lookup-box { margin-bottom: 12px; }
    .receipt-lookup-box > label { display: block; font-weight: 600; margin-bottom: 4px; }
    .receipt-head { margin: 8px 0 4px; font-weight: 600; color: #374151; }
    .receipt-lines th, .receipt-lines td { padding: 2px 8px; }
    .return-sep { border: none; border-top: 1px dashed #e5e7eb; margin: 16px 0; }
    .price-locked { color: #9ca3af; font-size: 0.85em; }
</style>

<!-- Баннер начала дня: во всю ширину, над вкладками. Виден только пока день закрыт. -->
{% include "shell/_day_banner.html" %}

<div class="shell-body">
    <!-- Ряд открытых вкладок. «Касса» — постоянная, без крестика (не закрывается). -->
    <div class="tabs" id="tabs">
        <div class="tab active" data-key="cashier">Касса</div>
    </div>

    <!-- Основная раскладка: слева касса, справа колонка разделов. -->
    <div class="cashier-layout">
        <!-- Левая панель (2/3): содержимое кассы. Панели живут в DOM. -->
        <div class="cashier-main">
            <div id="panels">
                <section class="panel active" id="panel-cashier">
                    {% include "cashier/_screen.html" %}
                </section>
            </div>
        </div>

        <!-- Правая колонка (1/3): кнопки разделов + управление днём внизу. -->
        <div class="cashier-side">
            <!-- Кнопки рабочих разделов: открывают/активируют вкладку (одна на раздел). -->
            <div class="launcher" id="launcher">
                {% for key, title in sections.items() %}
                <button type="button" class="btn-side" data-key="{{ key }}"
                        data-title="{{ title }}" data-url="/panels/{{ key }}">
                    {% if key == 'products' %}
                    {# Товары — коробка/пакет #}
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3l8 4v10l-8 4-8-4V7z"/><path d="M12 12l8-5"/>
                        <path d="M12 12v9"/><path d="M12 12L4 7"/>
                    </svg>
                    {% elif key == 'orders' %}
                    {# Заявки — список с галочкой (clipboard) #}
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                        <rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/>
                    </svg>
                    {% elif key == 'add' %}
                    {# Добавить товар — плюс #}
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14"/><path d="M5 12h14"/>
                    </svg>
                    {% elif key == 'receipts' %}
                    {# Чеки за день — чек/квитанция #}
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 21V5a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v16l-3-2-2 2-2-2-2 2-2-2-3 2z"/>
                        <path d="M9 9h6"/><path d="M9 13h6"/>
                    </svg>
                    {% endif %}
                    <span>{{ title }}</span>
                </button>
                {% endfor %}
            </div>

            <!-- Нижняя группа: завершить день (нативная форма → перезагрузка рамы),
                 disabled пока день не начат; возврат — модалка поверх кассы (2.5). -->
            <div class="side-day">
                <form method="post" action="/work-day/close" class="day-close-form">
                    <button type="submit" class="btn-side btn-day-finish"
                            {{ 'disabled' if not day_open else '' }}>
                        {# Завершить день — флажок #}
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 21V4"/><path d="M5 4h11l-2 4 2 4H5"/>
                        </svg>
                        <span>Завершить день</span>
                    </button>
                </form>
                <button type="button" id="return-btn" class="btn-side btn-return">
                    {# Возврат — стрелка назад #}
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/>
                    </svg>
                    <span>Возврат</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Оверлей модалки возврата. Тело подгружается по HTMX из /returns/modal. -->
<div class="modal-overlay" id="return-modal">
    <div id="return-modal-body"></div>
</div>

<script src="/static/shell.js"></script>
{% endblock %}
