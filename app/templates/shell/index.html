{% extends "base.html" %}

{% block title %}POS-система{% endblock %}

{% block content %}
<style>
    /* Рама вкладок — минимальный функциональный каркас (единый визуальный слой — позже). */
    .tabs { display: flex; flex-wrap: wrap; gap: 4px; border-bottom: 2px solid #e5e7eb;
        margin-bottom: 8px; }
    .tab { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
        border: 1px solid #e5e7eb; border-bottom: none; border-radius: 6px 6px 0 0;
        background: #f3f4f6; color: #374151; cursor: pointer; font-size: 0.95rem; }
    .tab.active { background: #fff; color: #111; font-weight: 600;
        box-shadow: inset 0 -2px 0 #2563eb; }
    .tab .close { border: none; background: none; color: #9ca3af; cursor: pointer;
        font-size: 1rem; line-height: 1; padding: 0 2px; }
    .tab .close:hover { color: #c0392b; }

    .launcher { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .launcher button { padding: 8px 14px; background: #eef2ff; color: #3730a3;
        border: 1px solid #c7d2fe; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .launcher button:hover { background: #e0e7ff; }

    .panel { display: none; }
    .panel.active { display: block; }
    .panel-stub { color: #6b7280; padding: 24px 0; }

    /* Кнопка возврата — разовое действие, открывает модалку (2.5), не вкладку. */
    .launcher button.return-launch { background: #fef2f2; color: #b91c1c;
        border-color: #fecaca; }
    .launcher button.return-launch:hover { background: #fee2e2; }

    /* Модалка возврата — оверлей поверх кассы. */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100;
        background: rgba(17, 24, 39, 0.5); overflow-y: auto; }
    .modal-overlay.open { display: block; }
    .return-modal-card { background: #fff; max-width: 760px; margin: 40px auto;
        padding: 20px 24px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.25); }
    .return-modal-header { display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid #eee; margin-bottom: 16px; }
    .return-modal-header h2 { margin: 0; }
    .return-close { border: none; background: none; font-size: 1.6rem; line-height: 1;
        color: #9ca3af; cursor: pointer; }
    .return-close:hover { color: #c0392b; }
    .return-modal-footer { margin-top: 16px; text-align: right; }

    /* Строка управления сменой (рабочий день). */
    .day-status { display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
        padding: 8px 12px; margin-bottom: 12px; border-radius: 6px; font-size: 0.95rem; }
    .day-status.is-open { background: #eafaf1; border: 1px solid #a7e0c0; }
    .day-status.is-closed { background: #fef3c7; border: 1px solid #fcd34d; }
    .day-status .day-badge { font-weight: 600; color: #374151; }
    .day-status .day-error { color: #b91c1c; }
    .btn-day { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer;
        color: #fff; font-size: 0.9rem; }
    .btn-day-open { background: #27ae60; }
    .btn-day-close { background: #b45309; }
    .day-closed-note { margin-top: 16px; padding: 12px 16px; background: #fef3c7;
        border: 1px solid #fcd34d; border-radius: 4px; color: #92400e; }

    /* Блок «Возврат по чеку» (4.2): поиск чека и его read-only строки. */
    .receipt-lookup-box { margin-bottom: 12px; }
    .receipt-lookup-box > label { display: block; font-weight: 600; margin-bottom: 4px; }
    .receipt-head { margin: 8px 0 4px; font-weight: 600; color: #374151; }
    .receipt-lines th, .receipt-lines td { padding: 2px 8px; }
    .return-sep { border: none; border-top: 1px dashed #e5e7eb; margin: 16px 0; }
    .price-locked { color: #9ca3af; font-size: 0.85em; }
</style>

<!-- Строка управления сменой: статус дня + начать/завершить (7.1-prep). -->
{% include "shell/_day_status.html" %}

<!-- Ряд открытых вкладок. «Касса» — постоянная, без крестика (не закрывается). -->
<div class="tabs" id="tabs">
    <div class="tab active" data-key="cashier">Касса</div>
</div>

<!-- Кнопки рабочих разделов: открывают/активируют вкладку (одна на раздел). -->
<div class="launcher" id="launcher">
    {% for key, title in sections.items() %}
    <button type="button" data-key="{{ key }}" data-title="{{ title }}"
            data-url="/panels/{{ key }}">{{ title }}</button>
    {% endfor %}
    <!-- Возврат — модалка поверх (2.5), не вкладка. Вне цикла разделов. -->
    <button type="button" id="return-btn" class="return-launch">Возврат</button>
</div>

<!-- Панели. Касса встроена на сервере и всегда живёт в DOM (стартовая вкладка). -->
<div id="panels">
    <section class="panel active" id="panel-cashier">
        {% include "cashier/_screen.html" %}
    </section>
</div>

<!-- Оверлей модалки возврата. Тело подгружается по HTMX из /returns/modal. -->
<div class="modal-overlay" id="return-modal">
    <div id="return-modal-body"></div>
</div>

<script src="/static/shell.js"></script>
{% endblock %}
